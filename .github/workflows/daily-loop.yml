name: Daily Learning Loop

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  daily-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Kill switch check
        id: killswitch
        run: |
          if grep -q "kill_switch: true" STATE.md; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ vars.LOOP_PAUSED }}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run AI Daily Learning Loop
        if: steps.killswitch.outputs.skip == 'false'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python scripts/run_daily_learning_loop.py

      - run: echo "done"