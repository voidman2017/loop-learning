# Deploy Pages — GitHub Pages 部署 workflow
# 在 push 到 main 时自动构建并发布站点

name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "site/**"
      - "state/**"
      - "scripts/**"
      - "STATE.md"
      - "REVIEW-QUEUE.md"
      - "SOURCES.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install -r requirements.txt

      - name: 构建站点
        run: |
          python scripts/build_site.py

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: "site/public"

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4